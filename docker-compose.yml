services:
  api-tester:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-tester
    # ports:
    #   - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./history:/app/history
      # 开发模式下挂载整个项目，实现热重载
      - ./public:/app/public
      - ./server.js:/app/server.js
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HTTP_PROXY=http://10.19.3.8:3128
      - HTTPS_PROXY=http://10.19.3.8:3128
      - NO_PROXY=localhost,127.0.0.1,10.0.0.0/8
    restart: unless-stopped
    network_mode: "host"    

